name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run tests
        run: bats tests/

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          set -e
          shopt -s nullglob
          _yaml=(helpers/*.yaml workload/*.yaml monitoring/yaml/*.yaml \
            monitoring/tests/fixtures/*.yaml .github/workflows/*.yaml)
          if ((${#_yaml[@]} == 0)); then
            echo "no YAML files matched" >&2
            exit 1
          fi
          yamllint "${_yaml[@]}"

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"
